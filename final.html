<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday anjleeey! 💖</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Fredoka+One&family=Pacifico&family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{--pink:#f8a4c8;--pink-deep:#e8689a;--pink-soft:#fce4f0;--cream:#fffaf8;--shadow:rgba(240,130,170,0.3);--text:#c0496e;--text-soft:#d4799a}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Nunito',sans-serif;background:linear-gradient(160deg,#fff0f7 0%,#fce4f0 40%,#ffe8f4 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:24px;overflow-x:hidden;cursor:default}
  .bg-dots{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:radial-gradient(circle,rgba(240,130,170,0.12) 1.5px,transparent 1.5px);background-size:28px 28px}
  .spark{position:fixed;width:7px;height:7px;border-radius:50%;pointer-events:none;z-index:9999;animation:sparkFly .7s ease-out forwards}
  @keyframes sparkFly{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}}
  .fheart{position:fixed;pointer-events:none;z-index:50;animation:fUp 2.2s ease-out forwards}
  @keyframes fUp{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-230px) scale(.3);opacity:0}}
  .confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;overflow:hidden}
  .piece{position:absolute;width:10px;height:10px;border-radius:2px;animation:fall linear both}
  @keyframes fall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

  .card{
    margin: auto;
    background:rgba(255,255,255,.88);backdrop-filter:blur(14px);
    border:2px solid rgba(248,164,200,.45);border-radius:36px;
    padding:40px 44px;box-shadow:0 10px 40px var(--shadow),inset 0 1px 0 rgba(255,255,255,.95);
    max-width:480px;width:92%;text-align:center;position:relative;overflow:hidden;
    animation:cardIn .6s cubic-bezier(.23,1,.32,1) both;
  }
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:5px;background:linear-gradient(90deg,var(--pink-deep),var(--pink),#ffb6d9,#ff85c0,var(--pink-deep));background-size:300% auto;animation:gradShift 2.5s linear infinite}
  @keyframes gradShift{to{background-position:300% center}}
  @keyframes cardIn{from{opacity:0;transform:scale(.88) translateY(30px)}to{opacity:1;transform:scale(1) translateY(0)}}

  /* Heartbeat heart */
  .big-heart{font-size:72px;display:block;animation:heartbeat 1s ease-in-out infinite;margin-bottom:8px}
  @keyframes heartbeat{0%,100%{transform:scale(1)}25%{transform:scale(1.18)}50%{transform:scale(1)}75%{transform:scale(1.12)}}

  /* Happy Birthday text */
  .hb-line{
    font-family:'Pacifico',cursive;
    font-size:clamp(26px,5.5vw,44px);
    background:linear-gradient(90deg,var(--pink-deep),#ff85c0,var(--pink-deep));
    background-size:200% auto;
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    animation:shimmer 3s linear infinite,popIn .5s .2s ease both;
    display:block;margin-bottom:4px;
  }
  @keyframes shimmer{to{background-position:200% center}}

  /* Typing name */
  .name-wrap{margin:4px 0 14px;min-height:56px;display:flex;align-items:center;justify-content:center}
  .name-text{
    font-family:'Fredoka One',cursive;
    font-size:clamp(42px,9vw,72px);
    color:var(--text);
    text-shadow:3px 3px 0 rgba(248,164,200,.5);
    letter-spacing:2px;
  }
  .cursor{display:inline-block;width:3px;height:1em;background:var(--pink-deep);margin-left:2px;animation:blink .8s step-end infinite;vertical-align:middle}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

  .final-msg{
    font-family:'Caveat',cursive;font-size:clamp(16px,3.5vw,22px);
    color:var(--text);line-height:1.8;font-weight:700;
    margin-bottom:20px;
    animation:slideUp .5s .8s ease both;
  }
  @keyframes slideUp{from{transform:translateY(28px);opacity:0}to{transform:translateY(0);opacity:1}}

  .emoji-row{font-size:28px;display:flex;gap:10px;justify-content:center;margin-bottom:20px;animation:slideUp .5s .95s ease both}
  .emoji-row span{display:inline-block;animation:bounce 1s ease-in-out infinite}
  .emoji-row span:nth-child(2){animation-delay:.15s}
  .emoji-row span:nth-child(3){animation-delay:.3s}
  .emoji-row span:nth-child(4){animation-delay:.45s}
  @keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}

  .cat-gif{width:90px;height:90px;object-fit:contain;filter:drop-shadow(0 4px 14px var(--shadow));animation:catBob 2s ease-in-out infinite;margin-bottom:10px}
  @keyframes catBob{0%,100%{transform:translateY(0) rotate(-2deg)}50%{transform:translateY(-12px) rotate(2deg)}}

  .btn{
    font-family:'Fredoka One',cursive;font-size:18px;
    padding:12px 30px;border:none;border-radius:50px;cursor:pointer;
    background:linear-gradient(135deg,var(--pink-deep),var(--pink));color:white;
    box-shadow:0 5px 0 rgba(0,0,0,.12);
    transition:transform .15s,box-shadow .15s;
    animation:slideUp .5s 1.1s ease both;
    margin-top:4px;
  }
  .btn:hover{transform:translateY(-3px);box-shadow:0 8px 0 rgba(0,0,0,.12)}
  .btn:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.12)}

  @keyframes popIn{from{transform:scale(.3);opacity:0}to{transform:scale(1);opacity:1}}

  .corner-deco{position:fixed;font-size:24px;pointer-events:none;z-index:2;opacity:.6;animation:floatDeco 4s ease-in-out infinite}
  .corner-deco:nth-child(1){top:18px;left:18px}.corner-deco:nth-child(2){top:18px;right:18px;animation-delay:1s}
  .corner-deco:nth-child(3){bottom:50px;left:18px;animation-delay:2s}.corner-deco:nth-child(4){bottom:50px;right:18px;animation-delay:.5s}
  @keyframes floatDeco{0%,100%{transform:translateY(0) rotate(0);opacity:.6}50%{transform:translateY(-10px) rotate(12deg);opacity:1}}

  .dots{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:100}
  .dot{width:8px;height:8px;border-radius:50%;background:rgba(248,164,200,.4);transition:all .35s}
  .dot.active{background:var(--pink-deep);width:22px;border-radius:4px}
</style>
</head>
<body>
<div class="bg-dots"></div>
<div class="confetti-wrap" id="confetti"></div>
<div class="corner-deco">🌸</div><div class="corner-deco">💕</div>
<div class="corner-deco">✨</div><div class="corner-deco">🌸</div>
<div class="dots">
  <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  <div class="dot"></div><div class="dot active"></div>
</div>

<div class="card">
  <img src="gifs/play.gif" class="cat-gif" alt="love cat"
       onerror="this.outerHTML='<span style=\'font-size:70px;display:block;margin-bottom:10px;animation:catBob 2s ease-in-out infinite\'>😻</span>'">

  <span class="big-heart">❤️</span>
  <span class="hb-line">Once again</span>
  <span class="hb-line">Happy Birthday,</span>

  <div class="name-wrap">
    <span class="name-text" id="nameText"><span class="cursor" id="cursor"></span></span>
  </div>

  <div class="final-msg">
    May every single day of your life<br>
    be as wonderful as you make my friend. 🌟<br><br>
    With so much love &amp; happiness,<br>
    forever and always 💕<br><br>
    I gave my gift to you,<br>
    now where is my cake? 😜🎂
  </div>

  <div class="emoji-row">
    <span>🌸</span><span>💖</span><span>🎂</span><span>✨</span>
  </div>

  <button class="btn" onclick="replay()">🔄 Replay from start</button>
</div>

<script>
  const COLORS=['#f8a4c8','#e8689a','#ffb6d9','#fce4f0','#fff','#ff85c0','#ffb0d9'];
  const NAME='anjleeey mam!😁';

  function createConfetti(n=100) {
    const wrap=document.getElementById('confetti');
    for(let i=0;i<n;i++){
      const c=document.createElement('div');c.className='piece';
      c.style.cssText=`left:${Math.random()*100}%;background:${COLORS[Math.floor(Math.random()*COLORS.length)]};width:${7+Math.random()*9}px;height:${7+Math.random()*9}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${2+Math.random()*3}s;animation-delay:${Math.random()*1.8}s`;
      wrap.appendChild(c);setTimeout(()=>c.remove(),6500);
    }
  }

  function spawnHearts(n=10) {
    const em=['💕','💖','🌸','✨','💗','💓','🎊'];
    for(let i=0;i<n;i++) setTimeout(()=>{
      const h=document.createElement('div');h.className='fheart';
      h.textContent=em[Math.floor(Math.random()*em.length)];
      h.style.cssText=`left:${10+Math.random()*80}vw;bottom:80px;font-size:${16+Math.random()*20}px;animation-delay:${Math.random()*.3}s`;
      document.body.appendChild(h);setTimeout(()=>h.remove(),2500);
    },i*120);
  }

  // Type the name
  function typeName() {
    const el=document.getElementById('nameText');
    const cur=document.getElementById('cursor');
    let i=0;
    function type(){
      if(i<NAME.length){
        const span=document.createElement('span');
        const ch=NAME[i];
        span.textContent=ch;
        el.insertBefore(span,cur);
        i++;
        const delay=ch===' '?80:ch==='!'?120:60+Math.random()*40;
        setTimeout(type,delay);
      } else {
        cur.style.display='none';
        // Confetti burst!
        createConfetti(140);
        spawnHearts(20);
        // Repeat hearts
        setTimeout(()=>spawnHearts(12),1200);
        setTimeout(()=>spawnHearts(10),2400);
      }
    }
    setTimeout(type, 400);
  }

  document.addEventListener('click',e=>{
    if(e.target.tagName==='BUTTON') return;
    for(let i=0;i<14;i++){
      const s=document.createElement('div');s.className='spark';
      const a=(i/14)*Math.PI*2,d=45+Math.random()*60;
      s.style.cssText=`left:${e.clientX}px;top:${e.clientY}px;background:${COLORS[Math.floor(Math.random()*COLORS.length)]};--tx:${Math.cos(a)*d}px;--ty:${Math.sin(a)*d}px`;
      document.body.appendChild(s);setTimeout(()=>s.remove(),800);
    }
    spawnHearts(3);
  });

  function replay(){
    document.body.style.opacity='0';document.body.style.transition='opacity 0.4s';
    setTimeout(()=>window.location.href='index.html',400);
  }

  document.body.style.opacity='0';document.body.style.transition='opacity 0.5s';
  window.addEventListener('load',()=>{
    document.body.style.opacity='1';
    // Start typing after card animates in
    setTimeout(typeName, 600);
  });
</script>
<script src="audio.js"></script>
</body>
</html>
