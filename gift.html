<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>A Surprise 🎁</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Fredoka+One&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
<style>
  :root{--pink:#f8a4c8;--pink-deep:#e8689a;--pink-soft:#fce4f0;--cream:#fffaf8;--shadow:rgba(240,130,170,0.25);--text:#c0496e;--text-soft:#d4799a}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Nunito',sans-serif;background:linear-gradient(160deg,#fff0f7 0%,#fce4f0 40%,#ffe8f4 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:24px;overflow-x:hidden;cursor:default}
  .bg-dots{position:fixed;inset:0;pointer-events:none;z-index:0;background-image:radial-gradient(circle,rgba(240,130,170,0.12) 1.5px,transparent 1.5px);background-size:28px 28px}
  .spark{position:fixed;width:7px;height:7px;border-radius:50%;pointer-events:none;z-index:9999;animation:sparkFly .7s ease-out forwards}
  @keyframes sparkFly{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--tx),var(--ty)) scale(0);opacity:0}}
  .fheart{position:fixed;pointer-events:none;z-index:50;animation:fUp 2.2s ease-out forwards}
  @keyframes fUp{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-220px) scale(.3);opacity:0}}
  .confetti-wrap{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:999;overflow:hidden}
  .piece{position:absolute;width:9px;height:9px;border-radius:2px;animation:fall linear infinite}
  @keyframes fall{0%{transform:translateY(-20px) rotate(0);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}

  .card{
    margin: auto;
    background:rgba(255,255,255,.85);backdrop-filter:blur(12px);
    border:2px solid rgba(248,164,200,.4);border-radius:32px;
    padding:40px 44px;box-shadow:0 8px 32px var(--shadow),inset 0 1px 0 rgba(255,255,255,.9);
    max-width:460px;width:90%;text-align:center;position:relative;overflow:hidden;
    animation:pageIn .5s cubic-bezier(.23,1,.32,1) both;
  }
  .card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--pink-deep),var(--pink),#ffb6d9,var(--pink-deep));background-size:200% auto;animation:gradShift 3s linear infinite}
  @keyframes gradShift{to{background-position:200% center}}
  @keyframes pageIn{from{opacity:0;transform:scale(.92) translateY(24px)}to{opacity:1;transform:scale(1) translateY(0)}}

  .gift-title{font-family:'Caveat',cursive;font-size:clamp(22px,4.5vw,34px);color:var(--text);font-weight:700;margin-bottom:14px;animation:popIn .5s .1s ease both}
  @keyframes popIn{from{transform:scale(.3);opacity:0}to{transform:scale(1);opacity:1}}

  .gift-emoji{
    font-size:100px;cursor:pointer;
    filter:drop-shadow(0 8px 20px var(--shadow));
    animation:giftFloat 2s ease-in-out infinite;
    transition:transform .3s;display:block;margin:0 auto;
    user-select:none;
  }
  @keyframes giftFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-16px)}}
  .gift-emoji:hover{transform:scale(1.12) rotate(5deg)!important}
  .gift-emoji.opening{animation:giftShake .15s ease-in-out 4}
  @keyframes giftShake{0%,100%{transform:rotate(0)}25%{transform:rotate(-8deg)}75%{transform:rotate(8deg)}}

  .gift-hint{font-family:'Caveat',cursive;font-size:20px;color:var(--text-soft);font-weight:700;margin-top:10px;animation:hintPulse 2s ease-in-out infinite}
  @keyframes hintPulse{0%,100%{opacity:.7}50%{opacity:1}}

  /* Countdown ring */
  .countdown-wrap{display:none;margin:12px auto;width:60px;height:60px;position:relative}
  .countdown-ring{transform:rotate(-90deg)}
  .ring-bg{fill:none;stroke:rgba(248,164,200,.3);stroke-width:4}
  .ring-progress{fill:none;stroke:var(--pink-deep);stroke-width:4;stroke-linecap:round;transition:stroke-dashoffset .1s linear;stroke-dasharray:157;stroke-dashoffset:157}
  .countdown-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Fredoka One',cursive;font-size:22px;color:var(--pink-deep)}

  .gift-msg{
    font-family:'Nunito',sans-serif;font-size:16px;color:var(--text-soft);
    text-align:center;max-width:320px;line-height:1.75;margin-top:12px;
    display:none;
  }
  .gift-msg.show{display:block;animation:popIn .5s cubic-bezier(.175,.885,.32,1.275) both}

  .btn{
    font-family:'Fredoka One',cursive;font-size:20px;
    padding:14px 38px;border:none;border-radius:50px;cursor:pointer;
    background:linear-gradient(135deg,var(--pink-deep),var(--pink));color:white;
    box-shadow:0 5px 0 rgba(0,0,0,.12);margin-top:24px;display:none;
    transition:transform .15s,box-shadow .15s;
  }
  .btn:hover{transform:translateY(-3px);box-shadow:0 8px 0 rgba(0,0,0,.12)}
  .btn:active{transform:translateY(2px);box-shadow:0 2px 0 rgba(0,0,0,.12)}
  .btn.show{display:inline-block;animation:popIn .5s cubic-bezier(.175,.885,.32,1.275) both}

  .corner-deco{position:fixed;font-size:22px;pointer-events:none;z-index:2;opacity:.5;animation:floatDeco 4s ease-in-out infinite}
  .corner-deco:nth-child(1){top:18px;left:18px}.corner-deco:nth-child(2){top:18px;right:18px;animation-delay:1s}
  .corner-deco:nth-child(3){bottom:50px;left:18px;animation-delay:2s}.corner-deco:nth-child(4){bottom:50px;right:18px;animation-delay:.5s}
  @keyframes floatDeco{0%,100%{transform:translateY(0) rotate(0);opacity:.5}50%{transform:translateY(-8px) rotate(10deg);opacity:.8}}
  .dots{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:100}
  .dot{width:8px;height:8px;border-radius:50%;background:rgba(248,164,200,.4);transition:all .35s}
  .dot.active{background:var(--pink-deep);width:22px;border-radius:4px}
</style>
</head>
<body>
<div class="bg-dots"></div>
<div class="confetti-wrap" id="confetti"></div>
<div class="corner-deco">🌸</div><div class="corner-deco">💕</div>
<div class="corner-deco">✨</div><div class="corner-deco">🌸</div>
<div class="dots">
  <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  <div class="dot"></div><div class="dot"></div><div class="dot"></div>
  <div class="dot active"></div><div class="dot"></div>
</div>

<div class="card">
  <div class="gift-title">Here's a surprise for you!!! 🎀</div>

  <span class="gift-emoji" id="giftBox" onclick="tapGift()">🎁</span>
  <div class="gift-hint" id="giftHint">Tap the gift! 👆</div>

  <!-- Suspense countdown ring -->
  <div class="countdown-wrap" id="countdownWrap">
    <svg class="countdown-ring" width="60" height="60" viewBox="0 0 60 60">
      <circle class="ring-bg" cx="30" cy="30" r="25"/>
      <circle class="ring-progress" id="ringProgress" cx="30" cy="30" r="25"/>
    </svg>
    <div class="countdown-num" id="countdownNum">3</div>
  </div>

  <div class="gift-msg" id="giftMsg"></div>
  <button class="btn" id="nextBtn" onclick="goNext()">Almost there… 💖</button>
</div>

<script>
  const COLORS=['#f8a4c8','#e8689a','#ffb6d9','#fce4f0','#fff','#ff85c0'];
  let opened=false, counting=false;

  function tapGift() {
    if(opened||counting) return;
    counting=true;
    new Audio('music/drums.mp3').play().catch(e=>console.log(e));
    if(typeof BGM !== 'undefined') BGM.pause();
    const box=document.getElementById('giftBox');
    const hint=document.getElementById('giftHint');
    hint.textContent='Opening… 🥁';
    box.classList.add('opening');
    box.style.animation='none';
    box.style.transform='scale(1.15)';

    document.getElementById('countdownWrap').style.display='block';

    const ring=document.getElementById('ringProgress');
    const num=document.getElementById('countdownNum');
    const total=3000, interval=50;
    let elapsed=0;

    const timer=setInterval(()=>{
      elapsed+=interval;
      const prog=elapsed/total;
      ring.style.strokeDashoffset = 157*(1-prog);
      const rem=Math.ceil((total-elapsed)/1000);
      num.textContent=rem>0?rem:'🎊';
      spawnHearts(1);

      if(elapsed>=total) {
        clearInterval(timer);
        openGift();
      }
    }, interval);
  }

  function openGift() {
    opened=true;
    if(typeof BGM !== 'undefined') BGM.play();
    const box=document.getElementById('giftBox');
    box.textContent='🎊';
    box.style.transform='scale(1.35)';
    box.style.transition='transform .3s';
    box.style.animation='';
    document.getElementById('countdownWrap').style.display='none';
    document.getElementById('giftHint').style.display='none';

    setTimeout(()=>{ box.style.transform='scale(1)'; },350);

    const msg=document.getElementById('giftMsg');
    msg.textContent='🌟 The greatest gift is having you in my life, anjleeey! You deserve every happiness today and always! 💕';
    msg.classList.add('show');
    document.getElementById('nextBtn').classList.add('show');

    createConfetti(100);
    spawnHearts(16);
  }

  function createConfetti(n=80) {
    const wrap=document.getElementById('confetti');
    for(let i=0;i<n;i++){
      const c=document.createElement('div');c.className='piece';
      c.style.cssText=`left:${Math.random()*100}%;background:${COLORS[Math.floor(Math.random()*COLORS.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${2.5+Math.random()*3}s;animation-delay:${Math.random()*1.5}s`;
      wrap.appendChild(c);setTimeout(()=>c.remove(),7000);
    }
  }

  function spawnHearts(n=8) {
    const em=['💕','💖','🌸','✨','💗','🎊'];
    for(let i=0;i<n;i++) setTimeout(()=>{
      const h=document.createElement('div');h.className='fheart';
      h.textContent=em[Math.floor(Math.random()*em.length)];
      h.style.cssText=`left:${10+Math.random()*80}vw;bottom:80px;font-size:${16+Math.random()*18}px;animation-delay:${Math.random()*.2}s`;
      document.body.appendChild(h);setTimeout(()=>h.remove(),2400);
    }, i*110);
  }

  document.addEventListener('click',e=>{
    if(e.target.tagName==='BUTTON'||e.target.closest('#giftBox')) return;
    for(let i=0;i<12;i++){
      const s=document.createElement('div');s.className='spark';
      const a=(i/12)*Math.PI*2,d=40+Math.random()*55;
      s.style.cssText=`left:${e.clientX}px;top:${e.clientY}px;background:${COLORS[Math.floor(Math.random()*COLORS.length)]};--tx:${Math.cos(a)*d}px;--ty:${Math.sin(a)*d}px`;
      document.body.appendChild(s);setTimeout(()=>s.remove(),800);
    }
  });

  function goNext(){
    document.body.style.opacity='0';document.body.style.transition='opacity 0.4s';
    setTimeout(()=>window.location.href='final.html',400);
  }
  document.body.style.opacity='0';document.body.style.transition='opacity 0.5s';
  window.addEventListener('load',()=>document.body.style.opacity='1');
</script>
<script src="audio.js"></script>
</body>
</html>
